[workspace]
members = ["services/*"]
resolver = "3"

[workspace.dependencies]
# --- Async runtime & HTTP ---
tokio = { version = "1",  features = ["full"] }
axum = { version = "0.8" }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors"] }
http = "1"

# --- Serialization ---
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.19", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# --- Config ---
dotenvy = "0.15"
config = "0.15"

# --- Error handling ---
thiserror = "2"
anyhow = "1"

# --- Auth & security ---
jsonwebtoken = "10"
argon2 = "0.5"
rand = "0.9"

# --- Async utils ---
async-trait = "0.1"
futures = "0.3"

# --- Logging ---
tracing = "0.1"

