services:
  mongo_review:
    image: mongo:8-noble
    container_name: mongo_review
    environment:
      MONGO_INITDB_ROOT_USERNAME: playlog_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    volumes:
      - mongo_review_data:/data/db
      - mongo_review_configdb:/data/configdb
      - mongo_review_mongot:/data/mong
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - playlog_network
volumes:
  mongo_review_data:
  mongo_review_configdb:
  mongo_review_mongot:
networks:
  playlog_network:
    external: true