services:
  mongo_multimedia:
    image: mongo:8-noble
    container_name: mongo_multimedia
    environment:
      MONGO_INITDB_ROOT_USERNAME: playlog_user
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    volumes:
      - mongo_multimedia_data:/data/db
      - mongo_multimedia_configdb:/data/configdb
      - mongo_multimedia_mongot:/data/mongot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - playlog_network
volumes:
  mongo_multimedia_data:
  mongo_multimedia_configdb:
  mongo_multimedia_mongot:
networks:
  playlog_network:
    external: true