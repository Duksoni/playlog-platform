<div class="list-container">
	<div class="header">
		<h2>Manage {{ entityLabel() }}</h2>
		<button mat-raised-button (click)="openCreateDialog()">
			<mat-icon fontSet="material-symbols-rounded">add</mat-icon>
			Create {{ entityLabel() }}
		</button>
	</div>

	<div class="filters">
		<mat-form-field appearance="outline" class="search-field">
			<mat-label>Search {{ entityLabel() }}</mat-label>
			<input matInput [formControl]="searchControl" placeholder="Type to search...">
			<mat-icon matSuffix fontSet="material-symbols-rounded">search</mat-icon>
		</mat-form-field>
	</div>

	<div class="table-container mat-elevation-z2">
		@if (entityService.loading()) {
			<div class="loading-shade">
				<mat-spinner diameter="40"></mat-spinner>
			</div>
		}

		<table mat-table [dataSource]="entityService.items()">
			<!-- Name Column -->
			<ng-container matColumnDef="name">
				<th mat-header-cell *matHeaderCellDef> Name</th>
				<td mat-cell *matCellDef="let element"> {{ element.name }}</td>
			</ng-container>

			<!-- Actions Column -->
			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef> Actions</th>
				<td mat-cell *matCellDef="let element">
					<button
						mat-icon-button
						(click)="openEditDialog(element)"
						matTooltip="Edit"
						matTooltipShowDelay="300"
						i18n-matTooltip="@@edit"
					>
						<mat-icon fontSet="material-symbols-rounded">edit</mat-icon>
					</button>
					@if (allowDelete()) {
						<button
							mat-icon-button
							class="delete-button" (click)="openDeleteDialog(element)"
							matTooltip="Delete"
							matTooltipShowDelay="300"
							i18n-matTooltip="@@delete"
						>
							<mat-icon fontSet="material-symbols-rounded">delete</mat-icon>
						</button>
					}
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

			<!-- Row shown when there is no matching data. -->
			<tr class="mat-row" *matNoDataRow>
				<td class="mat-cell" colspan="3">
					@if (!entityService.loading()) {
						<span i18n="@@searchNoDataFound">No data found matching the search criteria.</span>
					}
				</td>
			</tr>
		</table>

		@if (!searchControl.value) {
			<mat-paginator
				[length]="totalItems()"
				[pageSize]="10"
				[pageIndex]="pageIndex()"
				(page)="handlePageEvent($event)"
			>
			</mat-paginator>
		}
	</div>
</div>
