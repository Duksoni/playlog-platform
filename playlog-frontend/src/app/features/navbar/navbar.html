<mat-toolbar>
	@if (!topLevelDestination) {
		<button mat-icon-button (click)="location.back()" matTooltip="Go Back">
			<mat-icon fontSet="material-symbols-rounded">arrow_back</mat-icon>
		</button>
	}

	<span class="navbar-brand-text px-3" routerLink="/">Playlog</span>


	<span class="toolbar-spacer"></span>

	<button
		mat-icon-button
		(click)="changeTheme()"
		[matTooltip]="sessionService.theme() === 'light' ? 'Switch to Dark Theme' : 'Switch to Light Theme'"
	>
		<mat-icon fontSet="material-symbols-rounded">
			{{ sessionService.theme() === 'light' ? 'dark_mode' : 'light_mode' }}
		</mat-icon>
	</button>

	<mat-divider vertical class="ps-2"></mat-divider>
	<button
		mat-icon-button
		[matMenuTriggerFor]="sessionService.user().role === Role.GUEST ? profileMenuGuest : profileMenuUser"
		class="profile-menu-trigger"
		matTooltip="Profile"
	>
		<mat-icon fontSet="material-symbols-rounded">account_circle</mat-icon>
	</button>

	<mat-menu #profileMenuUser="matMenu">
		<button mat-menu-item routerLink="/profile">
			My Account
		</button>
		<mat-divider></mat-divider>
		<button
			mat-menu-item
			(click)="logout()"
			routerLink="/home"
		>
			<mat-icon fontSet="material-symbols-rounded">logout</mat-icon>
			Sign out
		</button>
	</mat-menu>

	<mat-menu #profileMenuGuest="matMenu">
		<button mat-menu-item (click)="openLoginDialog()">
			<mat-icon fontSet="material-symbols-rounded">login</mat-icon>
			Sign in
		</button>
		<button mat-menu-item (click)="openRegisterDialog()">
			<mat-icon fontSet="material-symbols-rounded">person_add</mat-icon>
			Sign up
		</button>
	</mat-menu>

</mat-toolbar>
